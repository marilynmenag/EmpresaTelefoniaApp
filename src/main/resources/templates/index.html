<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Empresa de Telefonía</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">📱 Empresa de Telefonía</a>
  </div>
</nav>

<div class="container mt-5">
  <h1 class="text-center mb-5">Sistema de Gestión Comercial</h1>
  <div class="row g-4 justify-content-center">

    <div class="col-md-3">
      <div class="card text-white bg-primary h-100">
        <div class="card-body text-center">
          <h1>📋</h1>
          <h5 class="card-title">Planes</h5>
          <p class="card-text">Gestionar planes telefónicos</p>
          <a href="/planes/" class="btn btn-light">Ir a Planes</a>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-white bg-success h-100">
        <div class="card-body text-center">
          <h1>👥</h1>
          <h5 class="card-title">Clientes</h5>
          <p class="card-text">Gestionar clientes</p>
          <a href="/clientes/" class="btn btn-light">Ir a Clientes</a>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-white bg-warning h-100">
        <div class="card-body text-center">
          <h1>🧑‍💼</h1>
          <h5 class="card-title">Vendedores</h5>
          <p class="card-text">Gestionar vendedores</p>
          <a href="/vendedores/" class="btn btn-light">Ir a Vendedores</a>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card text-white bg-danger h-100">
        <div class="card-body text-center">
          <h1>💰</h1>
          <h5 class="card-title">Ventas</h5>
          <p class="card-text">Gestionar ventas de planes</p>
          <a href="/ventas/" class="btn btn-light">Ir a Ventas</a>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
