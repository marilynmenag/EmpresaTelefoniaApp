<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Venta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Registrar Venta</h2>
    <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select class="form-select" th:field="*{cliente}">
                <option value="">-- Seleccione un cliente --</option>
                <option th:each="c : ${clientes}"
                        th:value="${c.id}"
                        th:text="${c.nombre + ' ' + c.apellido}">
                </option>
            </select>
            <span class="text-danger" th:if="${#fields.hasErrors('cliente')}" th:errors="*{cliente}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Vendedor</label>
            <select class="form-select" th:field="*{vendedor}">
                <option value="">-- Seleccione un vendedor --</option>
                <option th:each="v : ${vendedores}"
                        th:value="${v.id}"
                        th:text="${v.nombre + ' ' + v.apellido}">
                </option>
            </select>
            <span class="text-danger" th:if="${#fields.hasErrors('vendedor')}" th:errors="*{vendedor}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Plan</label>
            <select class="form-select" th:field="*{plan}">
                <option value="">-- Seleccione un plan --</option>
                <option th:each="p : ${planes}"
                        th:value="${p.id}"
                        th:text="${p.nombre + ' - $' + p.precio}">
                </option>
            </select>
            <span class="text-danger" th:if="${#fields.hasErrors('plan')}" th:errors="*{plan}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de Venta</label>
            <input type="date" class="form-control" th:field="*{fechaVenta}">
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" th:field="*{estado}">
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea class="form-control" th:field="*{observaciones}" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/ventas/" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
