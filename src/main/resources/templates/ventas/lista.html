<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .btn-atras {
          position: fixed;
          bottom: 25px;
          left: 25px;
          width: 55px;
          height: 55px;
          background-color: #dc3545;
          color: white;
          border-radius: 12px;
          text-decoration: none;
          font-size: 35px;
          font-weight: bold;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-atras:hover {
          background-color: #bb2d3b;
          color: white;
        }
    </style>
    <meta charset="UTF-8">
    <title>Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Lista de Ventas</h2>
    <a href="/ventas/nuevo" class="btn btn-success mb-3">+ Nueva Venta</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Vendedor</th>
            <th>Plan</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Observaciones</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="venta : ${ventas}">
            <td th:text="${venta.id}"></td>
            <td th:text="${venta.cliente.nombre + ' ' + venta.cliente.apellido}"></td>
            <td th:text="${venta.vendedor.nombre + ' ' + venta.vendedor.apellido}"></td>
            <td th:text="${venta.plan.nombre}"></td>
            <td th:text="${venta.fechaVenta}"></td>
            <td>
                    <span class="badge"
                          th:classappend="${venta.estado.name() == 'ACTIVO'} ? 'bg-success' :
                                         (${venta.estado.name() == 'APROBADO'} ? 'bg-primary' :
                                         (${venta.estado.name() == 'RECHAZADO'} ? 'bg-danger' :
                                         (${venta.estado.name() == 'EN_TRAMITE'} ? 'bg-warning' : 'bg-secondary')))"
                          th:text="${venta.estado}">
                    </span>
            </td>
            <td th:text="${venta.observaciones}"></td>
            <td>
                <a th:href="@{/ventas/editar/{id}(id=${venta.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/ventas/eliminar/{id}(id=${venta.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Está seguro de eliminar esta venta?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<a href="/" class="btn-atras">←</a>
</body>
</html>
