<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .btn-atras {
          position: fixed;
          bottom: 25px;
          left: 25px;
          width: 55px;
          height: 55px;
          background-color: #ffc107;
          color: black;
          border-radius: 12px;
          text-decoration: none;
          font-size: 35px;
          font-weight: bold;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-atras:hover {
          background-color: #e0a800;
          color: black;
        }
    </style>
    <meta charset="UTF-8">
    <title>Vendedores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Lista de Vendedores</h2>
    <a href="/vendedores/nuevo" class="btn btn-success mb-3">+ Nuevo Vendedor</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Código</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vendedor : ${vendedores}">
            <td th:text="${vendedor.id}"></td>
            <td th:text="${vendedor.nombre}"></td>
            <td th:text="${vendedor.apellido}"></td>
            <td th:text="${vendedor.codigo}"></td>
            <td th:text="${vendedor.telefono}"></td>
            <td th:text="${vendedor.email}"></td>
            <td>
                <a th:href="@{/vendedores/editar/{id}(id=${vendedor.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/vendedores/eliminar/{id}(id=${vendedor.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Está seguro de eliminar este vendedor?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<a href="/" class="btn-atras">←</a>
</body>
</html>
