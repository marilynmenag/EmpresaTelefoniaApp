<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .btn-atras {
          position: fixed;
          bottom: 25px;
          left: 25px;
          width: 55px;
          height: 55px;
          background-color: #ff5a1f;
          color: white;
          border-radius: 12px;
          text-decoration: none;
          font-size: 35px;
          font-weight: bold;
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-atras:hover {
          background-color: #d9480f;
          color: white;
        }
    </style>
    <title>Planes Telefónicos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="mb-4">Planes Telefónicos</h1>

<a th:href="@{/planes/nuevo}" class="btn btn-primary mb-3">
    Nuevo Plan
</a>

<table class="table table-bordered table-striped">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Precio</th>
        <th>Gigas</th>
        <th>Minutos</th>
        <th>Descripción</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="plan : ${planes}">
        <td th:text="${plan.id}"></td>
        <td th:text="${plan.nombre}"></td>
        <td th:text="${plan.tipo}"></td>
        <td th:text="${plan.precio}"></td>
        <td th:text="${plan.gigas}"></td>
        <td th:text="${plan.minutos}"></td>
        <td th:text="${plan.descripcion}"></td>

        <td>
            <a th:href="@{/planes/eliminar/{id}(id=${plan.id})}"
               class="btn btn-danger btn-sm">
                Eliminar
            </a>
        </td>
    </tr>
    </tbody>

</table>
<a href="/" class="btn-atras">←</a>

</body>
</html>
