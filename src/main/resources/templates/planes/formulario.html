<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Plan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Registrar Plan</h2>
    <form th:action="@{/planes/guardar}" th:object="${plan}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}">
            <span class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo</label>
            <input type="text" class="form-control" th:field="*{tipo}">
            <span class="text-danger" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}">
            <span class="text-danger" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Gigas</label>
            <input type="number" class="form-control" th:field="*{gigas}">
            <span class="text-danger" th:if="${#fields.hasErrors('gigas')}" th:errors="*{gigas}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Minutos</label>
            <input type="number" class="form-control" th:field="*{minutos}">
            <span class="text-danger" th:if="${#fields.hasErrors('minutos')}" th:errors="*{minutos}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripcion</label>
            <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
            <span class="text-danger" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/planes/" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
